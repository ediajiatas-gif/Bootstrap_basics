<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-md bg-body-tertiary">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Porche Customers</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarTogglerDemo01"
          aria-controls="navbarTogglerDemo01"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarTogglerDemo01">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0 gap-3">
            <li class="nav-item">
              <a class="nav-link active" href="/index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/about.html">About</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/contact.html">Contact</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container my-4">
      <form>
        <!-- First Name & Last Name -->
        <div class="row mb-3">
          <div class="col">
            <input
              type="text"
              class="form-control"
              placeholder="First name"
              aria-label="First name"
            />
          </div>
          <div class="col">
            <input
              type="text"
              class="form-control"
              placeholder="Last name"
              aria-label="Last name"
            />
          </div>
        </div>

        <!-- Email -->
        <div class="mb-3">
          <label for="validationServer01" class="form-label">Email address</label>
          <input
            type="email"
            class="form-control is-valid"
            id="validationServer01"
            aria-describedby="emailHelp"
            required
          />
          <div id="emailHelp" class="form-text">
            We'll never share your email with anyone else.
          </div>
        </div>

        <!-- Password -->
        <div class="mb-3">
          <label for="validationServer02" class="form-label">Password</label>
          <input
            type="password"
            class="form-control is-valid"
            id="validationServer02"
            aria-describedby="passwordHelp"
            required
          />
        </div>
        <div class="mb-3 form-check">
          <input
            type="checkbox"
            class="form-check-input"
            id="exampleCheck1"
            required
          />
          <label class="form-check-label" for="exampleCheck1"
            >Check to agree to Terms</label
          >
        </div>
        <button type="submit" class="btn btn-success">Submit</button>
      </form>

      <!-- Data Collection -->
    <h1>Simulated Data Collection</h1>
    <div class="table-responsive">
    <table class="table table-striped table-hover">
      <thead>
        <tr>
          <th scope="col">User</th>
          <th scope="col">First</th>
          <th scope="col">Last</th>
          <th scope="col">Email</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <th scope="row">1</th>
          <td>Mark</td>
          <td>Otto</td>
          <td>motto@email.com</td>
        </tr>
        <tr>
          <th scope="row">2</th>
          <td>Jacob</td>
          <td>Thornton</td>
          <td>jthorn@emai.com</td>
        </tr>
        <tr>
          <th scope="row">3</th>
          <td>John</td>
          <td>Doe</td>
          <td>jdoe@email.com</td>
        </tr>
      </tbody>
    </table>
    </div>

    <!-- Image and Button Utilities -->
    <h1>Image Section</h1>
    <div class="container-fluid mb-4 d-flex flex-column align-items-center gap-3">
      <img
        src="https://images.pexels.com/photos/30821414/pexels-photo-30821414.jpeg"
        class="img-fluid"
        alt="..."
      />

      <img
        src="https://images.pexels.com/photos/10373686/pexels-photo-10373686.jpeg"
        class="img-fluid rounded-circle"
        alt="..."
        style="width: 300px; height: 300px; object-fit: cover;"
      />
    </div>

    <!-- Buttons -->
    <div class="d-flex justify-content-center gap-3 py-3">
      <button class="btn btn-primary" type="button">Always Visible</button>
      <button class="btn btn-secondary d-none d-md-block" type="button">
        Hidden on Mobile
      </button>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
